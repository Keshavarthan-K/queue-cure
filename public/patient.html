<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Waiting Room</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #111827; color: white; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
        
        /* Scaled up for TV */
        .status-bar { width: 100%; max-width: 800px; display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 18px; font-weight: bold; }
        #connectionStatus { color: #10b981; } 
        
        #digitalTicket { display: none; background-color: white; color: black; padding: 20px; border-radius: 12px; width: 100%; max-width: 460px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: left; border-top: 8px solid #3b82f6; box-sizing: border-box; }
        
        #doctorBreakBanner { display: none; background-color: #ef4444; color: white; text-align: center; padding: 20px; margin-bottom: 30px; border-radius: 12px; font-size: 28px; font-weight: bold; width: 100%; max-width: 800px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 3px solid #b91c1c; box-sizing: border-box;}
        
        /* Widen the board and increase padding for TV */
        .display-board { background-color: #1f2937; border: 4px solid #374151; border-radius: 20px; padding: 60px; width: 100%; max-width: 800px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); box-sizing: border-box; }
        
        h1 { color: #9ca3af; font-size: 32px; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 10px; }
        
        /* Massive Token Number */
        .token-now { font-size: 200px; font-weight: bold; color: #10b981; margin: 10px 0; text-shadow: 0 0 30px rgba(16,185,129,0.5); line-height: 1; }
        
        /* Larger Patient Name */
        .patient-name { font-size: 48px; color: #e5e7eb; margin-bottom: 40px; font-style: italic; }
        
        /* Larger Up Next Banner */
        #upNextBanner { background-color: #374151; padding: 15px 30px; border-radius: 12px; margin: 0 auto 40px auto; font-size: 28px; color: #d1d5db; display: none; width: fit-content; border: 2px solid #4b5563; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; border-top: 3px solid #374151; padding-top: 30px; }
        .stat-box { background-color: #111827; padding: 25px; border-radius: 12px; }
        
        /* Larger Stat Labels and Values */
        .stat-label { font-size: 18px; color: #9ca3af; text-transform: uppercase; letter-spacing: 2px;}
        .stat-value { font-size: 48px; font-weight: bold; color: #3b82f6; margin-top: 10px; }
        
        #enableAudio { background-color: #374151; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #enableAudio:hover { background-color: #4b5563; }
        #downloadBtn { background-color: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px;}
        #downloadBtn:hover { background-color: #059669; }

        @media print {
            body { background-color: white; color: black; }
            .status-bar, .display-board, #enableAudio, #doctorBreakBanner, button { display: none !important; }
            #digitalTicket { box-shadow: none; border: 1px solid #ccc; }
        }
    </style>
</head>
<body>

<div class="status-bar">
    <button id="enableAudio">🔊 Unmute Announcements</button>
    <div id="connectionStatus">🟢 Live Sync Active</div>
</div>

<div id="doctorBreakBanner">
    ⚠️ DOCTOR UNAVAILABLE<br>
    <span style="font-size: 22px; font-weight: normal;">Expected Return Time: <span id="returnTimeText"></span></span>
</div>

<div id="digitalTicket">
    <h3 style="margin: 0 0 5px 0; color: #374151; text-transform: uppercase; font-size: 16px;">Clinic Digital Token</h3>
    <div style="font-size: 56px; font-weight: bold; color: #3b82f6; margin: 10px 0; text-align: center;">
        #<span id="ticketNumber"></span>
    </div>
    <div style="border-top: 1px dashed #ccc; margin: 15px 0;"></div>
    <p style="margin: 5px 0; font-size: 18px;"><strong>Name:</strong> <span id="ticketName"></span></p>
    <p style="margin: 5px 0; font-size: 18px;"><strong>Date:</strong> <span id="ticketDate"></span></p>
    <p style="margin: 5px 0; font-size: 18px;"><strong>Time Issued:</strong> <span id="ticketTime"></span></p>
    
    <div style="background-color: #f3f4f6; padding: 15px; border-radius: 8px; margin: 20px 0; border-left: 6px solid #f59e0b;">
        <p style="margin: 0; font-size: 18px;"><strong>Your Est. Wait:</strong> <span id="ticketWaitTime" style="color: #d97706; font-weight: bold;">Calculating...</span></p>
    </div>

    <div style="margin-top: 20px; text-align: center;">
        <button id="downloadBtn" onclick="downloadTicket()">📥 Download Ticket</button>
    </div>
</div>

<div class="display-board">
    <h1>Now Serving</h1>
    <div class="token-now" id="currentToken">--</div>
    <div class="patient-name" id="currentName">Waiting for doctor...</div>

    <div id="upNextBanner">
        <strong>Up Next:</strong> Token #<span id="nextToken" style="color: #60a5fa;">--</span> 
        <span style="color: #9ca3af; font-size: 20px; margin-left: 10px;">(Est. Wait: <span id="nextWaitTime" style="color: #fcd34d;">--</span>)</span>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-label">Patients Ahead</div>
            <div class="stat-value" id="tokensAhead">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Total Queue Time</div>
            <div class="stat-value" id="estimatedWait">0m 0s</div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let audioEnabled = false;
    let lastSpokenToken = "INITIAL"; 

    let currentServedAt = null;
    let currentToken = "None";
    let localWaitingList = [];
    let localClinicState = { isPaused: false, resumeTime: null };
    let localTokensAhead = 0;

    const urlParams = new URLSearchParams(window.location.search);
    const myToken = urlParams.get('token');
    const myName = urlParams.get('name');
    const myDate = urlParams.get('date');
    const myTime = urlParams.get('time');

    if (myToken) {
        document.getElementById('ticketNumber').innerText = myToken;
        document.getElementById('ticketName').innerText = myName || "Patient";
        document.getElementById('ticketDate').innerText = myDate || "--";
        document.getElementById('ticketTime').innerText = myTime || "--";
        document.getElementById('digitalTicket').style.display = 'block';
    }

    function downloadTicket() {
        const ticketElement = document.getElementById('digitalTicket');
        const downloadBtn = document.getElementById('downloadBtn');
        downloadBtn.style.display = 'none';
        html2canvas(ticketElement, { scale: 2, backgroundColor: "#ffffff" }).then(canvas => {
            downloadBtn.style.display = 'inline-block';
            const link = document.createElement('a');
            link.download = `Clinic-Token-${myToken}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }

    document.getElementById('enableAudio').addEventListener('click', () => {
        audioEnabled = true;
        document.getElementById('enableAudio').style.backgroundColor = '#10b981';
        document.getElementById('enableAudio').innerText = '🔊 Audio Enabled';
        const speech = new SpeechSynthesisUtterance("Queue system voice activated.");
        window.speechSynthesis.speak(speech);
    });

    socket.on('connect', () => {
        document.getElementById('connectionStatus').innerHTML = '🟢 Live Sync Active';
        document.getElementById('connectionStatus').style.color = '#10b981';
    });

    socket.on('disconnect', () => {
        document.getElementById('connectionStatus').innerHTML = '🔴 Offline - Reconnecting...';
        document.getElementById('connectionStatus').style.color = '#ef4444';
    });

    function formatTime(totalSecs) {
        if (totalSecs <= 0) return "0m 0s";
        const m = Math.floor(totalSecs / 60);
        const s = totalSecs % 60;
        return `${m}m ${s}s`;
    }

    function updateLiveWaitTimes() {
        let doctorBreakAddedSecs = 0; 
        
        if (localClinicState.isPaused && localClinicState.resumeTime) {
            const msRemaining = new Date(localClinicState.resumeTime) - new Date();
            if (msRemaining > 0) {
                doctorBreakAddedSecs = Math.floor(msRemaining / 1000);
            }
        }

        let baseRemainingSecs = 10 * 60; 
        
        if (currentToken !== "None" && currentServedAt) {
            const elapsedMs = Date.now() - new Date(currentServedAt).getTime();
            const elapsedSecs = Math.floor(elapsedMs / 1000);
            
            baseRemainingSecs = (10 * 60) - elapsedSecs;
            
            if (baseRemainingSecs < 120) {
                baseRemainingSecs = 120;
            }
        } else if (currentToken === "None") {
            baseRemainingSecs = 0; 
        }

        if (localWaitingList && localWaitingList.length > 0) {
            document.getElementById('nextToken').innerText = localWaitingList[0].tokenNumber;
            document.getElementById('nextWaitTime').innerText = formatTime(baseRemainingSecs + doctorBreakAddedSecs);
            document.getElementById('upNextBanner').style.display = 'block';
        } else {
            document.getElementById('upNextBanner').style.display = 'none';
        }

        if (localTokensAhead > 0) {
            let totalWaitSecs = baseRemainingSecs + ((localTokensAhead - 1) * 10 * 60) + doctorBreakAddedSecs;
            document.getElementById('estimatedWait').innerText = formatTime(totalWaitSecs);
        } else {
            document.getElementById('estimatedWait').innerText = "0m 0s";
        }

        if (myToken) {
            const myIndex = localWaitingList.findIndex(p => p.tokenNumber == myToken);
            let myWaitElement = document.getElementById('ticketWaitTime');
            
            if (myIndex !== -1) {
                let myPersonalWaitSecs = baseRemainingSecs + (myIndex * 10 * 60) + doctorBreakAddedSecs;
                myWaitElement.innerText = `~${formatTime(myPersonalWaitSecs)}`;
                myWaitElement.style.color = "#d97706"; 
            } else if (currentToken == myToken) {
                myWaitElement.innerText = "It's your turn! Please enter.";
                myWaitElement.style.color = "#10b981"; 
            } else {
                myWaitElement.innerText = "Please see reception.";
                myWaitElement.style.color = "#ef4444"; 
            }
        }
    }

    setInterval(updateLiveWaitTimes, 1000);

    socket.on('queue_updated', (data) => {
        if (lastSpokenToken === "INITIAL") {
            lastSpokenToken = data.currentToken;
        }

        currentServedAt = data.currentServedAt;
        currentToken = data.currentToken;
        localWaitingList = data.waitingList;
        localClinicState = data.clinicState;
        localTokensAhead = data.tokensAhead;

        if (data.clinicState && data.clinicState.isPaused) {
            const resumeDate = new Date(data.clinicState.resumeTime);
            document.getElementById('returnTimeText').innerText = resumeDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('doctorBreakBanner').style.display = 'block';
            document.getElementById('currentToken').innerText = "--";
            document.getElementById('currentName').innerText = "Doctor on Break...";
        } else {
            document.getElementById('doctorBreakBanner').style.display = 'none';
            document.getElementById('currentToken').innerText = data.currentToken;
            document.getElementById('currentName').innerText = data.currentName;
        }

        document.getElementById('tokensAhead').innerText = data.tokensAhead;

        updateLiveWaitTimes();

        if (audioEnabled && data.currentToken !== "None" && data.currentToken !== lastSpokenToken && !data.clinicState.isPaused) {
            lastSpokenToken = data.currentToken; 
            const speechText = `Token number ${data.currentToken}, ${data.currentName}, please proceed to the doctor.`;
            const speech = new SpeechSynthesisUtterance(speechText);
            speech.rate = 0.9; 
            speech.pitch = 1;
            window.speechSynthesis.speak(speech);
        }
    });
</script>

</body>
</html>
